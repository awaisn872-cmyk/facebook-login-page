<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>facebook login page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="leftpart">
            <h1>Facebook</h1>
            <h3>facebook helps you connect and share with people
                in your life
            </h3>
        </div>
        <div class="Rightpart">
            <div class="loginpage">
                <form>
                    <input type="text" placeholder="Email or Phone no">
                    <input type="password" placeholder=" Password">
                    <input type="submit">
                </form>
                <p>Forgot password ?</p>
                <hr>
                <div class="createaccount">
                    Create a new account
                </div>
            </div>
            <span> Create a page for well-known person or Orchestra or Business</span>
        </div>

    </div>
    <script src="scrip.js"></script>

</body>

</html>
